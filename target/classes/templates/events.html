<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Event Management System</title>
    <!-- Bootstrap CSS for modern look -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h1 class="mb-4 text-center text-primary fw-bold">Event Management System</h1>

    <!-- Search and Sort Bar -->
    <div class="row mb-3 align-items-center">
        <div class="col-md-6">
            <form th:action="@{/}" method="get" class="d-flex">
                <input type="text" name="keyword" th:value="${keyword}" class="form-control me-2 shadow-sm" placeholder="Search events by name or location...">
                <button type="submit" class="btn btn-primary shadow-sm">Search</button>
            </form>
        </div>
        <div class="col-md-6 text-end">
            <a th:href="@{/(sort='date')}" class="btn btn-outline-secondary shadow-sm me-2">Sort by Date</a>
            <a th:href="@{/}" class="btn btn-outline-info shadow-sm me-2">Reset</a>
            <button class="btn btn-success shadow-sm fw-bold" data-bs-toggle="modal" data-bs-target="#addEventModal">+ Add New Event</button>
        </div>
    </div>

    <!-- Event List -->
    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th class="ps-4">Name</th>
                        <th>Date</th>
                        <th>Location</th>
                        <th>Description</th>
                        <th class="text-end pe-4">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="event : ${events}">
                        <td class="ps-4 fw-bold text-secondary" th:text="${event.name}"></td>
                        <td th:text="${event.date}"></td>
                        <td th:text="${event.location}"></td>
                        <td class="text-muted" th:text="${event.description}"></td>
                        <td class="text-end pe-4">
                            <button class="btn btn-sm btn-outline-warning me-1" data-bs-toggle="modal" th:data-bs-target="'#updateModal' + ${event.id}">Edit</button>
                            <form th:action="@{/delete/{id}(id=${event.id})}" method="post" class="d-inline">
                                <button type="submit" class="btn btn-sm btn-outline-danger" onclick="return confirm('Are you sure you want to delete this event?')">Delete</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(events)}">
                        <td colspan="5" class="text-center text-muted py-4">No events found. Start by adding one!</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Add Event Modal -->
<div class="modal fade" id="addEventModal" tabindex="-1" aria-labelledby="addEventModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <form th:action="@{/add}" th:object="${newEvent}" method="post">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title fw-bold" id="addEventModalLabel">Add New Event</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Name</label>
                        <input type="text" class="form-control shadow-sm" th:field="*{name}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Date</label>
                        <input type="date" class="form-control shadow-sm" th:field="*{date}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Location</label>
                        <input type="text" class="form-control shadow-sm" th:field="*{location}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Description</label>
                        <textarea class="form-control shadow-sm" th:field="*{description}" rows="3"></textarea>
                    </div>
                </div>
                <div class="modal-footer bg-light">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-success fw-bold">Save Event</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Update Modals -->
<div th:each="event : ${events}">
    <div class="modal fade" th:id="'updateModal' + ${event.id}" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <form th:action="@{/update/{id}(id=${event.id})}" method="post">
                    <div class="modal-header bg-warning">
                        <h5 class="modal-title fw-bold">Edit Event</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Name</label>
                            <input type="text" class="form-control shadow-sm" name="name" th:value="${event.name}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Date</label>
                            <input type="date" class="form-control shadow-sm" name="date" th:value="${event.date}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Location</label>
                            <input type="text" class="form-control shadow-sm" name="location" th:value="${event.location}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Description</label>
                            <textarea class="form-control shadow-sm" name="description" rows="3" th:text="${event.description}"></textarea>
                        </div>
                    </div>
                    <div class="modal-footer bg-light">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-warning fw-bold">Update Event</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
